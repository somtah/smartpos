# Blueprint สำหรับ Render
# หลัง apply: Dashboard → service → Environment — ใส่ค่า sync: false ด้วยมือ
# ห้ามใส่รหัสจริงลง git
#
# ตัวอย่างค่าที่ต้อง paste ใน UI:
#   DATABASE_URL=postgresql://postgres:<รหัสDB>@db.njilweneszufrtntenmw.supabase.co:5432/postgres?sslmode=require
#   JWT_ACCESS_SECRET / JWT_REFRESH_SECRET = สุ่มยาว ๆ สองค่า
#   FRONTEND_ORIGIN = https://<ชื่อ>.vercel.app  (หลังมี URL จริง — กัน CORS)
#
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: smartpos-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    # seed ใช้ upsert จึงรันซ้ำได้ ป้องกัน production โล่งหลังสร้าง DB ใหม่
    startCommand: npx prisma migrate deploy && npm run prisma:seed && npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Supabase: แทน <รหัส> แล้ว paste ทั้งบรรทัดใน Render (ตัวแปรนี้ไม่ sync จาก repo)
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      # ไม่บังคับ: บังคับ login + JWT — ใส่ false ถ้าต้องการ (ค่าเริ่มต้นโค้ด = โหมดไม่ login)
      - key: DISABLE_AUTH
        sync: false
      # ไม่บังคับ: URL frontend Vercel (ไม่มี slash ท้าย) — ลดปัญหา CORS
      - key: FRONTEND_ORIGIN
        sync: false
      # Render ใส่ PORT เอง — Nest อ่าน process.env.PORT อยู่แล้ว
